<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acuario Atlantis - Tanques Virtuales</title>
    <style>
        :root {
            /* Colores de Marca y Fondo Global */
            --bg-global: #051025;
            --tank1-base: #0a4d8c;
            --tank2-base: #101030;
            --tank3-base: #1a2a4a;
            
            /* Colores de UI */
            --accent-blue: #2a88f5;
            --accent-green: #3adb8c;
            --text-main: #f0f5f9;
            --text-subtle: #8da1b9;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-global);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        h1, h2, h3 {
            margin: 0;
            font-weight: 700;
        }

        p {
            margin: 0;
            color: var(--text-subtle);
        }

        /* --- Panel de Control Estilo 'Glassmorphism' --- */
        .controls-panel {
            background: rgba(16, 26, 50, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 15px 30px;
            display: flex;
            gap: 20px;
            position: sticky;
            top: 20px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 20px;
        }

        .control-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-item label {
            font-size: 0.85rem;
            color: var(--text-subtle);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .control-item input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }

        .control-item input[type="color"]::-webkit-color-swatch {
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%;
        }

        /* --- Estructura Principal del Acuario --- */
        .aquarium-main {
            width: 100%;
            max-width: 1100px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .section-header {
            margin-bottom: 40px;
            text-align: center;
        }

        .section-header h2 {
            font-size: 2.2rem;
            color: var(--text-main);
        }

        .section-header p {
            font-size: 1.1rem;
            max-width: 600px;
            margin: 10px auto 0;
        }

        /* Contenedor de los Tanques */
        .tank-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        /* --- El Tanque de Cristal con Efectos --- */
        .tank {
            height: 450px;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            transition: background 1s ease; /* Transición suave de color */
        }

        /* Capa 1: Degradado Profundo */
        #tank1 { background: radial-gradient(circle at 50% 30%, var(--tank1-base) 0%, rgba(5, 10, 30, 0.9) 100%); }
        #tank2 { background: radial-gradient(circle at 50% 30%, var(--tank2-base) 0%, rgba(5, 10, 30, 0.9) 100%); }
        #tank3 { background: radial-gradient(circle at 50% 30%, var(--tank3-base) 0%, rgba(5, 10, 30, 0.9) 100%); }

        /* Capa 2: Efecto de Agua (Cáusticas) - Textura Realista */
        .water-effect {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at 50% -20%, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 70%);
            animation: waterGlitter 5s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes waterGlitter {
            0% { opacity: 0.7; transform: scale(1) translateX(0px); }
            100% { opacity: 1; transform: scale(1.08) translateX(10px); }
        }

        .tank-title {
            position: absolute;
            top: 20px; left: 20px;
            font-size: 1rem;
            color: var(--text-main);
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 12px;
            border-radius: 8px;
            z-index: 10;
        }

        /* --- Criaturas SVG Detalladas y Animadas --- */
        .creature {
            position: absolute;
            pointer-events: none;
        }

        /* Medusa (Brillo Bioluminiscente) */
        .jellyfish {
            width: 80px;
            fill: #70f1f1;
            filter: drop-shadow(0 0 15px #2a88f5);
        }
        .jelly-1 { top: 35%; left: 25%; animation: jellyfishPulse 6s ease-in-out infinite; }
        .jelly-2 { top: 20%; right: 25%; animation: jellyfishPulse 8s ease-in-out infinite -3s; transform: scale(0.8); }

        @keyframes jellyfishPulse {
            0% { transform: translateY(20px) scaleY(1) scaleX(1); opacity: 0.8; }
            40% { transform: translateY(-30px) scaleY(1.1) scaleX(0.9); opacity: 1; }
            70% { transform: translateY(-10px) scaleY(0.95) scaleX(1.05); }
            100% { transform: translateY(20px) scaleY(1) scaleX(1); opacity: 0.8; }
        }

        /* Tiburón (Silueta Fluida y Profunda) */
        .shark {
            width: 150px;
            fill: rgba(200, 215, 230, 0.7);
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
            top: 45%;
            animation: sharkCruise 12s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes sharkCruise {
            0% { left: -160px; transform: scaleX(1) rotate(5deg); }
            48% { transform: scaleX(1) rotate(-5deg); }
            50% { left: 110%; transform: scaleX(-1) rotate(-5deg); }
            98% { transform: scaleX(-1) rotate(5deg); }
            100% { left: -160px; transform: scaleX(1) rotate(5deg); }
        }

        /* Tortuga (Elegante y Lenta) */
        .turtle {
            width: 100px;
            fill: var(--accent-green);
            filter: drop-shadow(0 0 12px rgba(58, 219, 140, 0.4));
            animation: turtleGlide 18s linear infinite;
        }

        @keyframes turtleGlide {
            0% { right: -120px; bottom: 15%; transform: scaleX(1) rotate(15deg); }
            50% { right: 110%; bottom: 60%; transform: scaleX(1) rotate(-10deg); }
            51% { transform: scaleX(-1) rotate(-10deg); }
            100% { right: -120px; bottom: 15%; transform: scaleX(-1) rotate(15deg); }
        }

        /* Partículas de Agua / Burbujas Cinematic */
        .bubble {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: bubbleFloat 6s linear infinite;
        }

        @keyframes bubbleFloat {
            0% { bottom: -10px; transform: translateX(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { bottom: 100%; transform: translateX(30px); opacity: 0; scale: 4; }
        }

    </style>
</head>
<body>

    <div class="controls-panel">
        <div class="control-item">
            <label for="c1">T1 (Medusas)</label>
            <input type="color" id="c1" value="#0a4d8c">
        </div>
        <div class="control-item">
            <label for="c2">T2 (Tiburón)</label>
            <input type="color" id="c2" value="#101030">
        </div>
        <div class="control-item">
            <label for="c3">T3 (Tortuga)</label>
            <input type="color" id="c3" value="#1a2a4a">
        </div>
    </div>

    <div class="aquarium-main">
        <div class="section-header">
            <h2>Nuestros Ecosistemas Virtuales</h2>
            <p>Explora la diversidad de los océanos. Puedes personalizar la iluminación de cada tanque.</p>
        </div>
        
        <div class="tank-grid">
            
            <div class="tank" id="tank1">
                <div class="water-effect"></div>
                <h3 class="tank-title">Zona Abisal</h3>
                
                <svg class="creature jellyfish jelly-1" viewBox="0 0 100 100">
                    <path d="M20,40 Q20,10 50,10 Q80,10 80,40 Q80,50 50,45 Q20,50 20,40 Z"/>
                    <path d="M30,45 Q25,70 32,95 M40,46 Q43,65 38,90 M50,46 Q55,75 52,95 M60,46 Q58,70 65,92 M70,45 Q75,65 68,95" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                </svg>

                <svg class="creature jellyfish jelly-2" viewBox="0 0 100 100">
                    <path d="M20,40 Q20,10 50,10 Q80,10 80,40 Q80,50 50,45 Q20,50 20,40 Z"/>
                    <path d="M30,45 Q35,65 28,90 M42,46 Q38,70 45,95 M52,46 Q48,65 54,90 M65,45 Q70,75 62,95" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>

                <div class="bubble" style="left: 30%; width: 3px; height: 3px; animation-delay: 0s; animation-duration: 6s;"></div>
                <div class="bubble" style="left: 35%; width: 2px; height: 2px; animation-delay: 2s; animation-duration: 5s;"></div>
                <div class="bubble" style="left: 28%; width: 4px; height: 4px; animation-delay: 4s; animation-duration: 7s;"></div>
            </div>

            <div class="tank" id="tank2">
                <div class="water-effect"></div>
                <h3 class="tank-title">Fosa de Depredadores</h3>
                
                <svg class="creature shark" viewBox="0 0 120 60">
                    <path d="M10,30 Q30,15 70,15 Q100,20 115,30 Q100,40 70,45 Q30,45 10,30 Z M70,15 Q75,0 85,5 Q80,15 70,15 Z M95,24 L110,12 L105,30 L112,45 L98,34 Z M40,40 L35,52 L48,42 Z"/>
                </svg>

                <div class="bubble" style="left: 70%; width: 3px; height: 3px; animation-delay: 1s; animation-duration: 7s;"></div>
                <div class="bubble" style="left: 73%; width: 4px; height: 4px; animation-delay: 4s; animation-duration: 4s;"></div>
            </div>

            <div class="tank" id="tank3">
                <div class="water-effect"></div>
                <h3 class="tank-title">Arrecife de Coral</h3>
                
                <svg class="creature turtle" viewBox="0 0 100 100">
                    <ellipse cx="50" cy="50" rx="22" ry="28" />
                    <path d="M30,35 Q5,25 12,12 Q32,22 34,32 Z" />
                    <path d="M70,35 Q95,25 88,12 Q68,22 66,32 Z" />
                    <path d="M32,70 Q18,85 25,90 Q35,80 36,74 Z" />
                    <path d="M68,70 Q82,85 75,90 Q65,80 64,74 Z" />
                    <ellipse cx="50" cy="16" rx="7" ry="9" />
                </svg>

                <div class="bubble" style="left: 50%; width: 4px; height: 4px; animation-delay: 0.5s; animation-duration: 8s;"></div>
            </div>

        </div>

    </div>

    <script>
        // Función para asignar el control de color a un tanque y su variable CSS
        const initTankControl = (inputId, cssVariableName) => {
            document.getElementById(inputId).addEventListener('input', (e) => {
                const newColor = e.target.value;
                // Modificamos la variable CSS para un cambio suave y consistente
                document.documentElement.style.setProperty(cssVariableName, newColor);
            });
        };

        // Inicializamos los controles individuales para cada tanque
        initTankControl('c1', '--tank1-base');
        initTankControl('c2', '--tank2-base');
        initTankControl('c3', '--tank3-base');
    </script>
</body>
</html>
