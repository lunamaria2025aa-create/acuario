<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Acuario Virtual</title>
    <style>
        /* Estilos Globales con vibras de Dark Academia / Lofi */
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e2e2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 10px;
            color: #b8c1ec;
            text-shadow: 0 0 10px rgba(184, 193, 236, 0.5);
        }

        /* Controles de Color */
        .controls {
            margin-bottom: 20px;
            background: #16161a;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .controls label {
            font-size: 0.9rem;
            color: #a7a9be;
        }

        .controls input[type="color"] {
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }

        /* Contenedor de Tanques */
        .aquarium-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1000px;
        }

        /* Estilo Base del Tanque */
        .tank {
            height: 400px;
            border: 6px solid #232946;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.6), 0 8px 20px rgba(0,0,0,0.5);
            transition: background-color 0.5s ease;
            /* Color inicial por defecto (Azul oceánico profundo) */
            background-color: #0f4c81; 
        }

        .tank-title {
            position: absolute;
            top: 10px;
            left: 15px;
            margin: 0;
            font-size: 1.1rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 10px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        /* --- Animaciones y Criaturas --- */
        .creature {
            position: absolute;
            font-size: 3rem;
            user-select: none;
        }

        /* Tanque 1: Medusas (Movimiento Vertical/Flotante) */
        .jellyfish-1 {
            top: 60%;
            left: 20%;
            animation: floatUp 6s ease-in-out infinite alternate;
        }
        .jellyfish-2 {
            top: 30%;
            left: 60%;
            animation: floatUp 8s ease-in-out infinite alternate-reverse;
            font-size: 2.5rem;
        }

        @keyframes floatUp {
            0% { transform: translateY(20px) translateX(0px) rotate(0deg); opacity: 0.8; }
            50% { transform: translateY(-40px) translateX(10px) rotate(5deg); }
            100% { transform: translateY(-80px) translateX(-5px) rotate(-5deg); opacity: 0.9; }
        }

        /* Tanque 2: Tiburones (Movimiento Horizontal de lado a lado) */
        .shark {
            top: 40%;
            left: -100px;
            animation: swimHorizontal 10s linear infinite;
        }

        @keyframes swimHorizontal {
            0% { left: -80px; transform: scaleX(1); } /* Caminando a la derecha */
            45% { transform: scaleX(1); }
            50% { left: 110%; transform: scaleX(-1); } /* Gira a la izquierda */
            95% { transform: scaleX(-1); }
            100% { left: -80px; transform: scaleX(1); }
        }

        /* Tanque 3: Tortugas (Movimiento Diagonal y calmado) */
        .turtle-1 {
            bottom: 20%;
            right: -80px;
            animation: swimDiagonal 14s linear infinite;
        }

        @keyframes swimDiagonal {
            0% { right: -80px; bottom: 10%; transform: rotate(10deg) scaleX(1); }
            50% { right: 110%; bottom: 60%; transform: rotate(-10deg) scaleX(1); }
            51% { transform: scaleX(-1); } /* Gira */
            100% { right: -80px; bottom: 10%; transform: rotate(10deg) scaleX(-1); }
        }

        /* Burbujas de fondo para dar ambiente */
        .bubbles {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: riseBubbles 4s infinite linear;
        }
        .bubbles::before, .bubbles::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
        }
        .bubbles::before { left: -20px; width: 6px; height: 6px; animation: riseBubbles 5s infinite linear; }
        .bubbles::after { left: 20px; width: 8px; height: 8px; animation: riseBubbles 3s infinite linear; }

        @keyframes riseBubbles {
            0% { bottom: -10px; transform: translateX(0); opacity: 0; }
            50% { opacity: 0.7; transform: translateX(15px); }
            100% { bottom: 100%; transform: translateX(-15px); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>Acuario Interactivo</h1>
    
    <div class="controls">
        <label for="colorPicker">Cambiar color del agua de los tanques:</label>
        <input type="color" id="colorPicker" value="#0f4c81">
    </div>

    <div class="aquarium-container">
        
        <div class="tank" id="tank1">
            <h3 class="tank-title">Tanque de Medusas</h3>
            <div class="creature jellyfish-1">🪼</div>
            <div class="creature jellyfish-2">🪼</div>
            <div class="bubbles"></div>
        </div>

        <div class="tank" id="tank2">
            <h3 class="tank-title">Zona de Tiburones</h3>
            <div class="creature shark">🦈</div>
            <div class="bubbles" style="animation-delay: 1.5s;"></div>
        </div>

        <div class="tank" id="tank3">
            <h3 class="tank-title">Arrecife de Tortugas</h3>
            <div class="creature turtle-1">🐢</div>
            <div class="bubbles" style="animation-delay: 3s;"></div>
        </div>

    </div>

    <script>
        // Seleccionamos el input de color y todos los tanques
        const colorPicker = document.getElementById('colorPicker');
        const tanks = document.querySelectorAll('.tank');

        // Escuchamos el evento cuando el usuario cambia el color
        colorPicker.addEventListener('input', (event) => {
            const newColor = event.target.value;
            
            // Recorremos cada tanque para aplicarle el nuevo fondo
            tanks.forEach(tank => {
                tank.style.backgroundColor = newColor;
            });
        });
    </script>
</body>
</html>
